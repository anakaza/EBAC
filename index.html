<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulo 08 Tarefa -  Lista telefonica</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Lista telefonica</h1>
        </header>
    </div>


<div class="container">

    <form id="form-lista-telefonica">
        <input type="text" id="nome-contato" required placeholder="Nome do contato"/>
        <input type="number" id="numero-contato" required placeholder="Número do contato" />
        <button type="submit">Adicionar +</button>
    </form>

    <table cellspacing="0">

        <thead>
            <tr>
                <th>Nome do contato</th>
                <th>Número do contato</th>
            </tr>
        </thead>


        <tbody>
        </tbody>

        <tfoot>
        </tfoot>

    </table>

</div>

<script src="./main.js"></script>
</body>
</html>
